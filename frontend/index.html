<!DOCTYPE html>
<html>
<head>
<title>AI Emergency Surgery Command Center</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🚨 AI Emergency Surgery Command Center</h1>

<div class="dashboard">

<div class="card">
<h2>Patient</h2>
<p>Hemananda</p>
</div>

<div class="card">
<h2>Status</h2>
<p class="critical">CRITICAL</p>
</div>

<div class="card">
<h2>Surgery Countdown</h2>
<p id="timer">10:00</p>
</div>

<div class="card">
<h2>AI Diagnosis</h2>
<p id="diagnosis">Analyzing patient vitals...</p>
</div>

<div class="card">
<h2>AI Efficiency</h2>
<p id="efficiency">95%</p>
</div>

</div>

<h2>ECG Heartbeat Monitor</h2>

<div class="ecg-container">
<div id="ecg-line"></div>
</div>

<h2>Patient Vitals Monitor</h2>

<canvas id="vitalsChart"></canvas>

<h2>Critical Alerts</h2>

<div id="alerts" class="alerts"></div>

<script src="script.js"></script>

</body>
</html>

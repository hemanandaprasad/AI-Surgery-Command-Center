<!DOCTYPE html>
<html>
<head>
    <title>AI Emergency Surgery Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🚨 AI Emergency Surgery Command Center</h1>

    <div class="dashboard">
        <div class="panel">
            <h2>Patient Case File</h2>
            <p>Name: Hemananda</p>
            <p>Age: 18</p>
            <p>Status: Critical Trauma</p>
        </div>

        <div class="panel">
            <h2>AI Diagnosis</h2>
            <p id="diagnosis">Analyzing patient vitals...</p>
        </div>

        <div class="panel">
            <h2>ECG Monitor</h2>
            <div class="ecg"></div>
        </div>

        <div class="panel">
            <h2>Surgery Countdown</h2>
            <p id="timer">10:00</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>AI Surgery Command Center</title>
  <style>
    body {
      background: black;
      color: lime;
      font-family: Arial;
      text-align: center;
    }

    .ecg {
      width: 100%;
      height: 100px;
      background: black;
      position: relative;
      overflow: hidden;
      margin-top: 20px;
    }

    .line {
      position: absolute;
      width: 200%;
      height: 2px;
      background: lime;
      animation: move 2s linear infinite;
    }

    @keyframes move {
      from { left: 0; }
      to { left: -100%; }
    }

    .live {
      color: red;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

<h1>AI Emergency Surgery Command Center</h1>

<h2 class="live">🔴 LIVE MONITORING</h2>

<div class="ecg">
  <div class="line"></div>
</div>

<h2>Patient Monitor</h2>

<p>Patient: <span class="patient-name">---</span></p>
<p>Status: <span class="status">---</span></p>
<p>AI Diagnosis: <span class="diagnosis">---</span></p>

<h3>AI Risk Level</h3>
<progress id="riskBar" value="0" max="100" style="width:300px;"></progress>
<p><span id="riskText">0%</span></p>

<hr>

<h2>Enter Patient Details</h2>

<form id="patientForm">
  <input id="name" placeholder="Name" required><br><br>
  <input id="age" placeholder="Age" required><br><br>
  <input id="condition" placeholder="Condition" required><br><br>
  <button type="submit">Submit</button>
</form>

<script src="script.js"></script>

</body>
</html>
